<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Cloud</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #70c5ce; font-family: sans-serif; }
        
        /* UI Layer */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .ui-btn { pointer-events: auto; position: absolute; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        
        #installBtn { top: 20px; left: 20px; }
        #leaderBtn { top: 20px; right: 20px; background: #3498db; }
        
        /* Leaderboard Modal */
        #leaderboardModal { display: none; position: absolute; top: 10%; left: 10%; width: 80%; height: 75%; background: #ded895; z-index: 200; border: 4px solid #559122; border-radius: 20px; padding: 20px; overflow-y: auto; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="ui-layer">
        <button id="installBtn" class="ui-btn" onclick="alert('To install: Tap the 3-dots in your Chrome menu and choose \'Add to Home screen\'.')">📥 Install</button>
        <button id="leaderBtn" class="ui-btn" onclick="openModal()">🏆 Scores</button>
    </div>

    <div id="leaderboardModal">
        <h2 style="color:#559122; text-align:center; margin-top:0;">Top Scores</h2>
        <ul id="scoreList" style="list-style:none; padding:0; font-size: 18px;">Loading...</ul>
        <button onclick="closeModal()" style="width:100%; padding:15px; background:#559122; color:white; border:none; border-radius:8px; font-weight:bold; margin-top:15px; cursor:pointer;">Close</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyDlt5HxOU7JI46UV2S-h6yfcBUucYpjR8w",
            authDomain: "flappycloud-a020e.firebaseapp.com",
            projectId: "flappycloud-a020e",
            storageBucket: "flappycloud-a020e.firebasestorage.app",
            messagingSenderId: "1068210507083",

        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let myUsername = localStorage.getItem("flappy_cloud_name") || "Player_" + Math.floor(Math.random() * 9999);
        localStorage.setItem("flappy_cloud_name", myUsername);
        let bestScore = parseInt(localStorage.getItem("flappy_cloud_score")) || 0;

        // --- 2. LEADERBOARD LOGIC ---
        function openModal() {
            document.getElementById('leaderboardModal').style.display = 'block';
            let list = document.getElementById("scoreList");
            list.innerHTML = "Loading...";
            
            db.collection("leaderboard").orderBy("score", "desc").limit(20).get().then((snapshot) => {
                list.innerHTML = "";
                let rank = 1;
                snapshot.forEach((doc) => {
                    list.innerHTML += `<li style="padding: 10px; border-bottom: 2px dashed rgba(0,0,0,0.1);"><b>${rank}. ${doc.id}</b> — ${doc.data().score} pts</li>`;
                    rank++;
                });
                if(list.innerHTML === "") list.innerHTML = "<li>No scores yet!</li>";
            }).catch(err => { list.innerHTML = "Error loading scores."; });
        }

        function closeModal() { document.getElementById('leaderboardModal').style.display = 'none'; }

        // --- 3. GAME CORE ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const colors = { 1: "#000", 2: "#FAD02C", 3: "#FFF", 4: "#FF4A4A" };

        function getRandomHeight() {
            return Math.random() * (canvas.height - 300) + 50;
