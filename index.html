<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Cloud Game</title>
    <style>
        body { margin: 0; padding: 0; background-color: #70c5ce; font-family: Arial; overflow: hidden; }
        canvas { display: block; }
        
        /* Rank Button */
        #rankBtn { position: absolute; top: 10px; left: 10px; padding: 10px 20px; background: #FAD02C; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 5; }
        
        /* Leaderboard Modal */
        #leaderboardModal { display: none; position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; background: white; border-radius: 15px; padding: 20px; overflow-y: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 10; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <button id="rankBtn" onclick="openModal()">🏆 Rank</button>

    <div id="leaderboardModal">
        <h2 style="color: #FF4A4A; text-align: center;">Top 100 Players</h2>
        <ul id="scoreList" style="text-align: left; list-style: none; padding: 0;"></ul>
        <button onclick="closeModal()" style="padding:15px; width:100%; background:#ccc; border:none; border-radius:5px; font-weight:bold;">Close</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyDlt5HxOU7JI46UV2S-h6yfcBUucYpjR8w",
            authDomain: "flappycloud-a020e.firebaseapp.com",
            projectId: "flappycloud-a020e",
            storageBucket: "flappycloud-a020e.firebasestorage.app",
            messagingSenderId: "1068210507083",
            appId: "1:1068210507083:web:e96916766c3330dad2ecce"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Modal Logic
        function openModal() {
            document.getElementById("leaderboardModal").style.display = "block";
            db.collection("leaderboard").orderBy("score", "desc").limit(100).get().then((snapshot) => {
                let list = document.getElementById("scoreList");
                list.innerHTML = "";
                snapshot.forEach((doc, index) => {
                    list.innerHTML += `<li style="padding: 10px; border-bottom: 1px solid #eee;">${index + 1}. <b>${doc.id}</b> — ${doc.data().score} pts</li>`;
                });
            });
        }
        function closeModal() { document.getElementById("leaderboardModal").style.display = "none"; }

        // Game Logic
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let bird = { x: 50, y: canvas.height / 2, gravity: 0.6, velocity: 0, jump: -9 };
        let pipes = []; let frames = 0; let score = 0; let isGameOver = false;
        let myUsername = localStorage.getItem("flappy_cloud_name") || "Player" + Math.floor(Math.random() * 1000);
        let bestScore = localStorage.getItem("flappy_cloud_score") || 0;

        function saveToCloud(newScore) {
            if (newScore > bestScore) {
                bestScore = newScore;
                localStorage.setItem("flappy_cloud_score", bestScore);
                db.collection("leaderboard").doc(myUsername).set({ score: bestScore });
            }
        }

        window.addEventListener("touchstart", function(e) { e.preventDefault(); tap(); }, { passive: false });
        function tap() {
            if (isGameOver) { bird.y = canvas.height/2; bird.velocity=0; score=0; pipes=[]; frames=0; isGameOver=false; gameLoop(); }
            else { bird.velocity = bird.jump; }
        }

        function gameLoop() {
            if (isGameOver) return;
            frames++; bird.velocity += bird.gravity; bird.y += bird.velocity;
            ctx.fillStyle = "#70c5ce"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (frames % 100 === 0) pipes.push({ x: canvas.width, topH: Math.random()*200+50 });
            
            pipes.forEach((p, i) => {
                p.x -= 3; ctx.fillStyle = "#73BF2E"; ctx.fillRect(p.x, 0, 60, p.topH);
                if(bird.x > p.x && bird.x < p.x+60 && (bird.y < p.topH || bird.y > p.topH+160)) isGameOver=true;
                if(p.x < -60) { pipes.splice(i, 1); score++; }
            });

            ctx.fillStyle="yellow"; ctx.fillRect(bird.x, bird.y, 30, 30);
            ctx.fillStyle="white"; ctx.font="30px Arial"; ctx.fillText(score, 20, 80);
            
            if (bird.y > canvas.height - 50) isGameOver = true;
            if (isGameOver) saveToCloud(score);
            else requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
